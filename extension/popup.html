<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; padding: 16px; width: 280px; }
    h3 { margin: 0 0 12px; font-size: 14px; }
    label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px;
            border: 1px solid #ddd; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
    button { width: 100%; padding: 8px; background: #2563eb; color: #fff;
             border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; }
    .connected { color: #16a34a; }
    .disconnected { color: #dc2626; }
  </style>
</head>
<body>
  <h3>AI Browser Bridge</h3>

  <label>Relay Server URL</label>
  <input id="relayUrl" type="text" placeholder="wss://your-server.com/ws" />

  <label>Token</label>
  <input id="token" type="password" placeholder="Paste your token here" />

  <button id="save">Save & Connect</button>

  <div id="status"></div>

  <script src="dist/popup.js"></script>
</body>
</html>
